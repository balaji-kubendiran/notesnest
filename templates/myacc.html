<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Notes Sharing</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            color: #333;
            padding: 20px;
            line-height: 1.6;
            transition: all 0.3s ease;
        }
        body.dark-mode {
            background: #1a1a1a;
            color: #e0e0e0;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }
        body.dark-mode .container {
            background: #2d2d2d;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        h2 {
            color: #8b5cf6;
            margin: 30px 0 20px 0;
            font-size: 24px;
        }
        body.dark-mode h2 {
            color: #a78bfa;
        }
        input, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s;
            background: white;
            color: #333;
        }
        body.dark-mode input, body.dark-mode textarea {
            background: #3d3d3d;
            color: #e0e0e0;
            border-color: #555;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #8b5cf6;
        }
        .avatar-section {
            display: flex;
            gap: 20px;
            align-items: center;
            margin-bottom: 20px;
        }
        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(45deg, #8b5cf6, #a78bfa);
            border: 4px solid #e1e5e9;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: all 0.3s;
        }
        body.dark-mode .avatar {
            border-color: #555;
        }
        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        button {
            background: #8b5cf6;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            margin: 5px;
            transition: background 0.3s;
        }
        button:hover {
            background: #7c3aed;
        }
        .toggle-container {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin: 20px 0;
        }
        .toggle-item {
            flex: 1;
            min-width: 220px;
            padding: 15px;
            background: #f8fafc;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 2px solid #e1e5e9;
            transition: all 0.3s;
        }
        body.dark-mode .toggle-item {
            background: #3d3d3d;
            border-color: #555;
        }
        .switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 34px;
        }
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 34px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 26px;
            width: 26px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: #8b5cf6;
        }
        input:checked + .slider:before {
            transform: translateX(26px);
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }
        .stat {
            text-align: center;
            padding: 20px;
            background: linear-gradient(135deg, #f8fafc, #e2e8f0);
            border-radius: 12px;
            transition: all 0.3s;
        }
        body.dark-mode .stat {
            background: linear-gradient(135deg, #3d3d3d, #555);
        }
        .stat-number {
            font-size: 32px;
            font-weight: bold;
            color: #8b5cf6;
            margin-bottom: 5px;
        }
        .danger-btn {
            background: #ef4444 !important;
            width: 100%;
            margin-top: 20px;
        }
        .danger-btn:hover {
            background: #dc2626 !important;
        }
        .gray-btn {
            background: #6b7280 !important;
            width: 100%;
            margin-top: 10px;
        }
        .gray-btn:hover {
            background: #4b5563 !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>👤 Profile Settings</h2>
        
        <div class="avatar-section">
            <div class="avatar" id="avatarPreview"></div>
            <div>
                <input type="file" id="profilePic" accept="image/*" style="margin-bottom: 10px;">
                <button onclick="saveProfile()">Save Profile</button>
            </div>
        </div>

        <input type="email" id="email" placeholder="your.email@example.com" style="margin-bottom:10px;">
        <input type="text"  id="fullName" placeholder="Full Name" style="margin-bottom:10px;">
        <input type="text"  id="college"  placeholder="College / Semester" style="margin-bottom:10px;">
        <textarea id="bio" rows="3" placeholder="About yourself..."></textarea>

        <h2>🔔 Notifications</h2>
        <div class="toggle-container">
            <div class="toggle-item">
                <span>New notes in my subjects</span>
                <label class="switch">
                    <input type="checkbox" id="notifyNotes">
                    <span class="slider"></span>
                </label>
            </div>
            <div class="toggle-item">
                <span>Comments on my notes</span>
                <label class="switch">
                    <input type="checkbox" id="notifyComments">
                    <span class="slider"></span>
                </label>
            </div>
        </div>

        <h2>🔒 Privacy</h2>
        <div class="toggle-container">
            <div class="toggle-item">
                <span>Notes public by default</span>
                <label class="switch">
                    <input type="checkbox" id="publicNotes">
                    <span class="slider"></span>
                </label>
            </div>
        </div>

        <h2>🎨 Appearance</h2>
        <button onclick="toggleDarkMode()" id="themeBtn">🌙 Dark Mode</button>

        <h2>📊 Your Stats</h2>
        <div class="stats">
            <div class="stat">
                <div class="stat-number" id="statUploads">—</div>
                Notes Uploaded
            </div>
            <div class="stat">
                <div class="stat-number" id="statDownloads">—</div>
                Downloads
            </div>
        </div>

        <button class="danger-btn" onclick="changePassword()">🔐 Change Password</button>
        <button class="gray-btn" onclick="deleteAccount()">🗑️ Delete Account</button>
    </div>

    <script>
        function loadData() {
            // Load from localStorage (set during login)
            document.getElementById('email').value    = localStorage.getItem('email')     || '';
            document.getElementById('fullName').value = localStorage.getItem('full_name') || '';
            document.getElementById('college').value  = localStorage.getItem('college')   || '';
            document.getElementById('bio').value      = localStorage.getItem('bio')       || '';

            ['notifyNotes', 'notifyComments', 'publicNotes'].forEach(id => {
                const checkbox = document.getElementById(id);
                if (checkbox) checkbox.checked = localStorage.getItem(id) === 'true';
            });

            // Load stats
            loadStats();
        }

        async function loadStats() {
            const user_id = localStorage.getItem('user_id');
            if (!user_id) return;
            try {
                const res = await fetch('/api/get_stats?user_id=' + user_id);
                const data = await res.json();
                document.getElementById('statUploads').textContent   = data.uploads   ?? '0';
                document.getElementById('statDownloads').textContent = data.downloads ?? '0';
            } catch (e) {
                // silently fail, keep dashes
            }
        }

        function saveProfile() {
            const data = {
                email:     document.getElementById('email').value,
                full_name: document.getElementById('fullName').value,
                college:   document.getElementById('college').value,
                bio:       document.getElementById('bio').value
            };
            Object.keys(data).forEach(key => localStorage.setItem(key, data[key]));

            ['notifyNotes', 'notifyComments', 'publicNotes'].forEach(id => {
                const cb = document.getElementById(id);
                if (cb) localStorage.setItem(id, cb.checked);
            });

            alert('✅ Profile saved!');
        }

        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('darkMode', isDark);
            document.getElementById('themeBtn').textContent = isDark ? '☀️ Light Mode' : '🌙 Dark Mode';
        }

        async function changePassword() {
            const newPass = prompt('Enter new password (min 6 characters):');
            if (!newPass) return;
            if (newPass.length < 6) { alert('Password too short.'); return; }

            const user_id = localStorage.getItem('user_id');
            if (!user_id) { alert('Not logged in.'); return; }

            try {
                const res = await fetch('/change-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id, new_password: newPass })
                });
                const data = await res.json();
                if (res.ok) {
                    alert('✅ Password updated!');
                } else {
                    alert(data.error || 'Failed to update password.');
                }
            } catch (e) {
                alert('Could not connect to server.');
            }
        }

        function deleteAccount() {
            if (confirm('Are you sure? This will log you out and clear all local data.')) {
                localStorage.clear();
                window.location.href = '/login';
            }
        }

        document.getElementById('profilePic').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(ev) {
                    document.getElementById('avatarPreview').innerHTML =
                        '<img src="' + ev.target.result + '" alt="Profile">';
                };
                reader.readAsDataURL(file);
            }
        });

        window.onload = function() {
            const user_id = localStorage.getItem('user_id');
            if (!user_id) { window.location.href = '/login'; return; }

            loadData();
            if (localStorage.getItem('darkMode') === 'true') {
                document.body.classList.add('dark-mode');
                document.getElementById('themeBtn').textContent = '☀️ Light Mode';
            }
        };
    </script>
</body>
</html>
