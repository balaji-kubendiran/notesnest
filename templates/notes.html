<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Notes - NotesNest</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-image: url("/static/bg2.jpg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            height: 100vh;
            color: white;
        }

        /* sidebar */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 200px;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            padding: 20px;
        }

        .sidebar h1 {
            font-size: 28px;
            margin-bottom: 40px;
        }

        .sidebar a {
            display: block;
            color: white;
            text-decoration: none;
            margin: 15px 0;
            font-size: 18px;
        }

        /* main section */
        .main {
            margin-left: 220px;
            padding: 40px;
        }

        /* semester box */
        .semester-box {
            width: 300px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            margin-bottom: 40px;
        }

        .semester-box select {
            width: 200px;
            padding: 10px;
            border: none;
            border-radius: 6px;
        }

        /* subject boxes */
        .subjects {
            display: none;
            gap: 30px;
            flex-wrap: wrap;
        }

        /* blur card */
        .subject-card {
            width: 200px;
            padding: 25px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            text-align: center;
            transition: 0.3s;
        }

        .subject-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.3);
        }

        .subject-card button {
            margin-top: 10px;
            padding: 8px 16px;
            background: blueviolet;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .subject-card button:hover{
            background: rgb(111,0,255);
        }

        .uploads-container { display: flex; flex-wrap: wrap; gap: 20px; margin-top: 20px; }
        .upload-card {
            background: rgba(255, 255, 255, 0.9); padding: 15px; border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); width: 220px; text-align: center;
            color: #333;
        }
        .btn-group { display: flex; gap: 5px; justify-content: center; margin-top: 10px; }
        .view-btn { background-color: #2ecc71; color: white; padding: 8px 12px; border-radius: 4px; text-decoration: none; font-size: 12px; }
        .delete-btn { background-color: #e74c3c; color: white; border: none; padding: 8px 12px; cursor: pointer; border-radius: 4px; font-size: 12px; }

        /* All notes section */
        .all-notes-container { display: flex; flex-wrap: wrap; gap: 20px; margin-top: 20px; }
        .note-card {
            background: rgba(255, 255, 255, 0.9); padding: 15px; border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2); width: 220px; text-align: center;
            color: #333;
        }
        .note-card h4 { margin-bottom: 6px; font-size: 14px; word-break: break-word; }
        .note-card .subject-label { font-size: 12px; color: #666; margin-bottom: 10px; }
        .download-btn { background-color: blueviolet; color: white; padding: 8px 12px; border-radius: 4px; text-decoration: none; font-size: 12px; display: inline-block; }
        .info-btn { background-color: #3498db; color: white; border: none; padding: 8px 12px; cursor: pointer; border-radius: 4px; font-size: 12px; }

        /* Info modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.active { display: flex; }
        .modal-box {
            background: white;
            border-radius: 12px;
            padding: 30px;
            width: 320px;
            color: #333;
            text-align: center;
        }
        .modal-box h3 { margin-bottom: 15px; color: blueviolet; }
        .modal-box p { margin: 8px 0; font-size: 14px; }
        .modal-close {
            margin-top: 20px;
            padding: 10px 24px;
            background: blueviolet;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="sidebar">
    <h1>NotesNest</h1>
    <a href="/homepage">Home</a>
    <a href="/upload">Upload</a>
    <a href="/notes">Notes</a>
</div>

<div class="main">
    <h2>B.Tech Information Technology</h2>

    <div class="semester-box">
        <label>Select Semester</label><br><br>
        <select id="semSelect" onchange="showSubjects(this.value)">
            <option value="">Choose Semester</option>
            <option value="sem1">Semester 1</option>
            <option value="sem2">Semester 2</option>
            <option value="allNotes">All Notes</option>
            <option value="myNotes">My Uploads</option>
        </select>
    </div>

    <div id="sem1" class="subjects">
        <div class="subject-card"><h3>BEEE</h3><button onclick="loadSubjectNotes('sem1','BEEE')">Open</button></div>
        <div class="subject-card"><h3>C PROGRAMMING</h3><button onclick="loadSubjectNotes('sem1','C PROGRAMMING')">Open</button></div>
    </div>

    <div id="sem2" class="subjects">
        <div class="subject-card"><h3>PYTHON</h3><button onclick="loadSubjectNotes('sem2','PYTHON')">Open</button></div>
        <div class="subject-card"><h3>EVS</h3><button onclick="loadSubjectNotes('sem2','EVS')">Open</button></div>
    </div>

    <div id="allNotes" class="subjects">
        <h3>All Available Notes</h3>
        <div id="allNotesList" class="all-notes-container">
            <p>Loading...</p>
        </div>
    </div>

    <div id="myNotes" class="subjects">
        <h3>My Cloud Storage</h3>
        <div id="uploadsList" class="uploads-container">
            <p>Select "My Uploads" to sync...</p>
        </div>
    </div>
</div>

<!-- Info Modal -->
<div class="modal-overlay" id="infoModal">
    <div class="modal-box">
        <h3>Note Info</h3>
        <p><strong>Title:</strong> <span id="modalTitle"></span></p>
        <p><strong>Uploaded by:</strong> <span id="modalUploader"></span></p>
        <p><strong>Semester:</strong> <span id="modalSemester"></span></p>
        <p><strong>Uploaded at:</strong> <span id="modalTime"></span></p>
        <button class="modal-close" onclick="closeModal()">Close</button>
    </div>
</div>

<script>
function showSubjects(semester) {
    document.querySelectorAll('.subjects').forEach(div => div.style.display = 'none');
    if (!semester) return;

    const target = document.getElementById(semester);
    if (semester === 'myNotes' || semester === 'allNotes') {
        target.style.display = 'block';
    } else {
        target.style.display = 'flex';
    }

    if (semester === 'myNotes') fetchMyUploads();
    if (semester === 'allNotes') fetchAllNotes();
}

async function fetchAllNotes() {
    const list = document.getElementById('allNotesList');
    list.innerHTML = '<p>Loading all notes...</p>';
    try {
        const res = await fetch('/api/get_all_notes');
        const notes = await res.json();
        list.innerHTML = '';
        if (!notes || notes.length === 0) {
            list.innerHTML = '<p>No notes available yet.</p>';
            return;
        }
        notes.forEach(note => {
            const card = document.createElement('div');
            card.className = 'note-card';
            card.innerHTML = `
                <h4>${note.title}</h4>
                <div class="subject-label">${note.semester}</div>
                <div class="btn-group">
                    <a href="${note.file_url}" target="_blank" download class="download-btn">⬇ Download</a>
                    <button class="info-btn" onclick='showInfo(${JSON.stringify(note)})'>ℹ Info</button>
                </div>
            `;
            list.appendChild(card);
        });
    } catch (e) {
        list.innerHTML = '<p style="color:red;">Could not load notes.</p>';
    }
}

async function fetchMyUploads() {
    const list = document.getElementById('uploadsList');
    list.innerHTML = '<p>Syncing with Cloud...</p>';
    const user_id = localStorage.getItem('user_id');
    if (!user_id) { list.innerHTML = '<p>Please login first.</p>'; return; }

    try {
        const res = await fetch('/api/get_my_uploads?user_id=' + user_id);
        const savedFiles = await res.json();
        list.innerHTML = '';

        if (!savedFiles || savedFiles.length === 0) {
            list.innerHTML = '<p>No uploads found.</p>';
            return;
        }

        savedFiles.forEach(file => {
            const card = document.createElement('div');
            card.className = 'upload-card';
            card.innerHTML = `
                <h4>${file.title}</h4>
                <div class="btn-group">
                    <a href="${file.file_url}" target="_blank" class="view-btn">View</a>
                    <button onclick="deleteNote(${file.id})" class="delete-btn">Delete</button>
                </div>
            `;
            list.appendChild(card);
        });
    } catch (error) {
        list.innerHTML = "<p style='color:red;'>Server unreachable.</p>";
    }
}

async function loadSubjectNotes(semester, subject) {
    alert('Subject notes for ' + subject + ' — coming soon!');
}

async function deleteNote(id) {
    if (!confirm('Delete this note?')) return;
    const user_id = localStorage.getItem('user_id');
    try {
        const res = await fetch('/api/delete_note', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id, user_id })
        });
        const data = await res.json();
        if (res.ok) {
            alert('Deleted!');
            fetchMyUploads();
        } else {
            alert(data.error || 'Delete failed.');
        }
    } catch (e) {
        alert('Could not connect to server.');
    }
}

function showInfo(note) {
    document.getElementById('modalTitle').textContent    = note.title;
    document.getElementById('modalUploader').textContent = note.uploader_name || 'Unknown';
    document.getElementById('modalSemester').textContent = note.semester;
    document.getElementById('modalTime').textContent     = new Date(note.created_at).toLocaleString();
    document.getElementById('infoModal').classList.add('active');
}

function closeModal() {
    document.getElementById('infoModal').classList.remove('active');
}
</script>
</body>
</html>
